apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: eshope
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: eshope-platform
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
