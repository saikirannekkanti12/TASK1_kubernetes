<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eShope - Men & Women Fashion</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; }
      header { background: #2874f0; color: white; padding: 12px 20px; }
      .container { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
      .tabs { display: flex; gap: 12px; margin-bottom: 16px; }
      .tabs button { padding: 8px 14px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; }
      .tabs .active { background: #2874f0; color: white; border-color: #2874f0; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
      .card { background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
      .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; }
      .price { color: #1b7f2a; font-weight: bold; }
    </style>
  </head>
  <body>
    <header><h2>eShope Fashion - Flipkart Inspired</h2></header>
    <div id="root" class="container"></div>

    <script type="text/babel">
      const API_URL = '__API_URL__';

      function App() {
        const [products, setProducts] = React.useState([]);
        const [gender, setGender] = React.useState('all');

        React.useEffect(() => {
          fetch(`${API_URL}/api/products`)
            .then((res) => res.json())
            .then(setProducts)
            .catch(() => setProducts([]));
        }, []);

        const filtered = gender === 'all' ? products : products.filter((p) => p.gender === gender);

        return (
          <>
            <div className="tabs">
              <button className={gender === 'all' ? 'active' : ''} onClick={() => setGender('all')}>All</button>
              <button className={gender === 'men' ? 'active' : ''} onClick={() => setGender('men')}>Men</button>
              <button className={gender === 'women' ? 'active' : ''} onClick={() => setGender('women')}>Women</button>
            </div>
            <div className="grid">
              {filtered.map((item) => (
                <div className="card" key={item.id}>
                  <img src={item.image_url} alt={item.name} />
                  <h4>{item.name}</h4>
                  <p>{item.category}</p>
                  <p className="price">₹{item.price}</p>
                </div>
              ))}
            </div>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
