apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: finbank-new
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: finbank/auth:v1
        ports:
        - containerPort: 8081
