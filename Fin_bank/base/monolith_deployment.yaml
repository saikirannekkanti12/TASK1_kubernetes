apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith
  namespace: finbank-legacy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monolith
  template:
    metadata:
      labels:
        app: monolith
    spec:
      containers:
      - name: monolith
        image: nvenkatasaikiran/frontend:v1
        ports:
        - containerPort: 8080
