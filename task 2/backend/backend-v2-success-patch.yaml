apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: eshope
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        version: v2
    spec:
      containers:
        - name: backend-api
          env:
            - name: APP_VERSION
              value: v2
